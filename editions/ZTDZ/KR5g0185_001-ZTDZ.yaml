front:
  text: 上清太上帝君九真中經卷上旣一
  hash: sha256:3297c4a6423ea6497c572cc896538d779cac95788b61541b0e8cbe874db4d0f4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0185_SJB_001-340033a, image: sjb/34/340033a.png}
body:
  text: 太虚眞人南嶽上仙赤松子傳太上帝君九眞中經内訣中央黃老君者太上太微天帝君之弟也以清虚上皇二年混爾始生日暉重曜連光暎靈五雲翳蓋慶煙玄停年七𡻕仍自知長生之要天仙之法乃眇綸上思欽納玄眞蕭條靈想心棲神源廣體八絶握空投全解脫於文蔚之羅披素於空住之肆浩洲黯深玄波雲歭總轡遁遷澄理萬塗煥冷風於妙覺隱摽霄以遊盤激玄元於天外運九氣於霞津逸韻蘭波凝清渟旋竒音𡨋響雲㑹八煙理翫太初冥心髙象希塗十方搜神幽元掇飈振毫潜素隱微目豁玄元之户手披萬寢之庭仰欣神匠俯悲五難流浪師契窈窕明機濯易神頴歸想眞靈爾乃天韻妙藹宿㑹玄感於是大上授以帝君九眞之經八道秘言之章施修道成受書爲太極眞人太極有四眞人中央黄老君䖏其左得佩龍玄之文神虎之符帶流金之鈴執紫毛之節巾金精之巾或扶晨華冠駕鬱華飛龍乘三素之雲八道秘言曰欲行九眞之法者長齋清室常以三月三日五月五日九月九日及本命日用東流水沐浴五香之氣又以甲子日夜半沐浴畢燒香於左右向本命心再拜心祝曰太上髙眞九靈景精帝君五神太一歸明使我飛仙上登紫庭沐浴華池身神澄清桃君守命帝君反嬰上通太虚五藏自生太上曰夫人唯結精積氣受胎歛血黄白幽凝丹紫合煙所以凝骨吐津散布流液四度會化九宫一結五神命其形軀太一定其符籍忽爾而立怳爾而成罔爾而具脫爾而生於是乃九神來入安在其宫五藏玄生五神主焉父母唯知生育之始我也而不覺帝君五神來適於其間也人體有尊神其居无常出入乎上中下三田廻易隂陽去故納新展轉榮輸流注元津大神虚生内結以成一身灌質化鍊變景光明非如三魂七魄是積靈受氣自生於人父母者也帝君九魂變形一時忽爲尊神有九名號曰九眞君此太一帝君之混合而一變也分爲上下旁適萬道子能修之則出水入火五臟常生長齋隱栖以存其眞此文一名九眞内訣一名太上飛文一名外國放品一名神州靈章雖有四名故一寳書耳第一眞法以正月本命日甲子甲戍日平旦帝君太一五神壹共混合變爲一大神在心之内號曰天精君字飛生上英貌如嬰兒始生之狀是其日平旦當入室接手於兩膝上閉氣冥目内視存天精君坐在心中號曰大神使大神口出紫氣鬱然以繞我心外九重氣上衝泥丸中内外如一畢因叩齒九通咽液九過祝曰天精大君飛生上英帝君内化來見心中身披朱衣頭巾丹冠左佩龍書右帶虎文和精三道合神上元五靈奉符與帝同全口吐紫華養心凝神赤藏自生得爲飛仙畢夜半復行之如上法此是帝君五神應時自然混變爲一大神耳所謂觸節順生者矣不復待兆存念而成之也第二眞法以三月本命日及甲申日辰時帝君太一合㑹五神混化内變爲一大神大神分形散氣盡布在諸骨節中號曰堅玉君是其時也當入室接手於兩膝上閉氣冥目注心内視存堅玉君字凝羽珠入坐喉下胃管中化白氣以入諸百骨節中存大神口土白氣以繞骨九重内外鬱鬱如雲霧之煙也畢叩齒九通咽液九過祝曰堅玉大君來入骨中身披素衣頭巾白冠字凝羽珠灌養九門左佩龍書右帶金眞口吐白氣固骨凝筋白骨不朽筋亦不泯百節生華使我飛仙畢夜半生氣時復一行之九眞日也帝君太一五神自然混化立爲一大神不復待兆先思存而後爲結變也貌狀並如嬰兒之形九眞同法爾此是九魂七魄化五神結凝帝君九變太一三斗同把符籍定録玄清使兆長生不死上昇仙庭者也此道幽秘上靈所寳非有仙籍者不得聞也非有宿契者不得見也聞見之者皆應運挺生與靈合得故冥感吉㑹㧞匠幽領天神來過王華接盻故九眞堅心八道悟觀矣斯乃三元之合符非陸行之所希也先陳盟誓乃得宣焉第三眞法以四月本命日及四月甲午丁卯日巳時帝君太一五神混合化生大神大神又歘爾分形爲黄氣鬱鬱盡流入諸精血中號曰元生君字黄寧子玄巳時當入室接手兩膝上閉氣冥目内視存見元生君周遊一身血脉精液之中使口吐黄氣以纒熏孔脉之外及一身九重使内外並同黄氣畢叩齒九通咽液九過祝曰元生大君同灌血軀身披黄衣頭巾紫芙左佩虎録右帶龍書羽衣上披威儀扶胥口吐黄津固血鎭虚眞氣日入邪氣消除精盈液溢九靈俱居使我飛仙天地同符畢夜半生氣時又一施行第四眞法以六月甲辰日本命日戊寅日午時帝君太一五神變爲一大神來入在肝中號曰青明君字明輪童子至此日午時當入接手於兩膝上閉氣冥目内視存青明大君入坐肝中使口吐青氣以繞肝九重畢叩齒九通咽液九過祝曰青明大君來入我肝身披青衣頭巾翠冠左佩虎章右帶龍文字爲童子寳眞明輪口吐青氣養肝導神青藏自生上爲天仙太一護精抱魄撿魂帝君奉籍使我得眞畢夜半生氣時復一行之第五眞法以七月三日及本命日庚午日已時帝君太一五神混合化爲一大神在脾中號曰養光君字太倉子至此日時兆入室接手於兩膝上閉氣冥目内視注心存養光君入坐脾中使口吐緑氣以繞脾九重氣上衝泥丸中内外洞徹鬱鬱畢叩齒九通咽液九過祝曰養光大君來入脾中上灌三元是爲太倉身披緑衣頭巾蓮冠左佩玉靈右帶威神五靈秉鉞七電九震口吐緑華養脾滯魂黄藏自生上爲眞人畢夜半生氣時復一行之第六眞法以八月十五日及本命日庚申日申時帝君太一五神混合化爲一大神在肺中號曰上元素玉君字梁南中童子至其日時也兆當入室接手於兩膝上閉氣冥目内視存上元素玉君入坐肺中使口吐五色氣以繞肺九重上徹泥丸中内外鬱然畢叩齒九通咽液九過祝曰上元大君來坐肺中三天梁南靈華中童子身披龍衣黄晨華冠右把皇籍帝君同輪太一把圖右執靈篇左佩玄書右帶虎文口吐五氣時復一行之第七眞法以九月十九日及本命日戊戌日酉時帝君太一五神混合化爲一大神忽爾又因分形爲二神分坐散形在兩腎中號曰玄陽君字冥光先生至此日時兆當入室接手於兩膝上冥目閉氣内視存玄陽君化形並入兩腎中使口吐蒼氣以繞腎九重上衝泥丸内外鬱然畢叩齒九通咽液九過祝曰玄陽帝君入坐腎中身披紫衣頭巾扶晨左佩龍符右帶鳯文冥光先生常在帝前口吐蒼華灌腎靈根太上徘徊上迎帝君下籍書我名紳黒藏自生身爲飛仙北登玄闕遊行天關髙歩上虚𢹂手五神畢夜半生氣時復一行之第八眞法以十月十二日及本命日辛巳日午時帝君太一五神混合變化爲一大神在膽中號曰含景君字北臺玄精至其日時也兆當入室接手於兩膝上閉氣冥目内視存含景君入坐於膽中使口吐五色氣繞膽九重上衝泥丸雲霧内外通帀鬱然也畢叩齒九通咽液九過祝曰含景大君來坐膽中身披錦衣頭戴紫冠北臺玄精化生靈煙左佩神光右帶玉眞口吐五炁養膽強身上帝三命與我結親桃君記符太一七陳和精寳血理液固筋使我上昇得爲飛仙北朝虚皇乗軿三元畢夜半生氣時復一行之第九眞法以十一月二十八日及本命日丙子日已時帝君大一五神混合變化爲一大神在泥丸紫房之中號曰帝昌上皇君字先靈元宗此神者是帝君之父祖故自九化混魂反形於祖父以降於上宫也定名仙書解結胞中胞中之節非祖无以散化非父无以披根非帝无以正魂故湏祖父來營定形神以長存也兆毎至其日時當沐浴燒香左右入室平坐接手於兩膝上存帝昌上皇君在泥丸紫房之中使口吐紫氣繞頭九重畢又使口吐紫氣繞兩目内外九重畢又使口吐紫氣繞舌九重畢又使口吐紫氣繞齒九重畢凡四九三十六繞氣使一身内外都鬱然洞徹如日在身内之狀也都畢叩齒三十六通咽液三十六過祝曰帝昌祖君帝皇元神鎭守紫房宫在泥丸黄闕金室混爲九魂魂生萬變乃成帝君五神奉侍七氣上眞龍衣鳯帔紫翠青縁手把皇符頭巾華冠左佩玉瑛右帶虎文下坐日月口吐紫煙周氣齒舌朝漑眼脣出丹入虚呼魄召魂凝精固胎六合長歡上登太微列補仙官夫一年之中九眞之道畢矣周而復始則泥丸領靈目童明全五藏自生血脉保津若身未昇登合形俱晨者則冝翳景示俗暫入太隂也身經三官者三官不得犯也則九眞召魄太一守骸三元護氣太一攝魂骨肉不朽五臟不隕能死能生能隂能陽出虚入无天地俱生是以道士清靜營形感致九眞之氣應也三元飛精以盈虚太一抱我尸而反質微乎深哉微乎深哉子常修九眞之道者百神揖拜萬鬼受事若經太隂則形骸不朽五臟自生計二十四年更得生焉豁爾而寤了爾而覺明明憶昔日之入太隂也似一宿之睡卧耳悵然已在於棺槨之外朗然巳坐丘山之巔斯迺九眞之幽妙帝君之極神也夫行此道者欲得寡言靜心言不及死正行不滛語不及色又欲得惜氣養神起居安詳閉氣使極吐氣使微出虚入无綿綿不絶此所以帝君所栖乃玄母之所親可以存五神可以念九眞也太上帝君九眞寳符文原闕符右此符常以八節日朱書服之太極眞人曰常當闇諷之毎至朔望旦及夜半吟詠三過以和九魂復帝房之氣使人神正邪消百關開朗兆善秘寳勿得妄宣此所謂三天龍書者也太上九眞作龍書帝君神庭以身爲家天尊朱室明堂是居正坐太極玄丹不邪玄母所乗三素之輿元父所控赤羽飛車左御絳鸞右轡靈烏一寸正方上靈共都丹臺火闕流暎散虚髙棲太微手把紫録靈淵素池金醴水玉九氣徘徊飛華雲躍中有大神不可名目父駕元氣母載玄軸巾日精華腰帶虎籙流火萬丈眼生龍燭天帝秉節鳯衣羽𧜭常存九眞神帝所育乃在紫房明堂之北灌生續精防守玄谷出入命室遨遊洞關時入中宫上通太元盤桓四氣九星判分五藏堅華太一守魂寢息幽庭役使七神子能詠之白日登晨精感妙對攝御靈獸山崩水潰呼噏響救生地得時上昇天宿九眞道畢泄則禍遘三官泄毒考罰宣漏當傳仙才審可成就中央黄老君八道祕言章祕言微曰閒心靜室寥朗虚眞逸想妙觀騰濯玄人苟誠感上㑹精悟暉晨亦將得見丹景之氣三素飛雲八轝朱輦紫霞瓊輪上清浮盻徊轡三元髙皇秉節靈童攀轅太素擁蓋南極臨軒帝君守房合景五神七氣續明髙暉逺纒冥光外暎濛蔚龍顔象燭太虚流逸七觀也子勤候之立便飛仙雲輪忽降則白日登晨不煩復凝霜濯華玄腴金丹也一道秘言曰以立春日正月甲乙日清朝北望有紫緑白雲者是爲太上三元君三素飛雲也其時三元君乗八轝之輪上詣天皇太帝子候見是三色雲當心存叩頭自摶心存四再拜自陳乞曰曽孫某甲少好道德修行九眞沐浴五神並爲天帝帝君所見記録今日有幸遇三元君出遊乞得侍給輪轂任意祈祝矣若三見元君之轝者則白日昇仙不須復他存思千百所施爲也八道所行祝拜之辭亦如此此所謂八道秘言者矣非有仙録者不得聞也二道秘言曰以春分之日及寅卯日夜半東北望有玄青黄雲者是爲太微天帝君三素雲也其時太微天帝君乗八景之轝上詣髙上玉皇也見者心存拜祝如上法若四見天帝之轝者則白日有龍軿羽蓋來見迎而昇天也三道秘言曰以立夏之日及甲子上旬戊辰已己之日清旦西北望有紫青黄雲者是爲太極上眞君三元内宫眞人三素雲也其時太極上眞三元眞人乗玄景緑轝上詣紫微宫心祝拜如上法若五見太極轝者則白日昇仙四道秘言曰以夏至日甲戍旬戊寅已卯之日清旦東南望有赤白青雲者是爲扶桑大帝君三素雲也其時扶桑公太帝君乗光明八道之轝上詣太微宫見之心祝拜如上法若四見之者則白日有雲龍見迎而昇天也五道秘言曰以立秋之日甲申上旬戊子已丑之日清旦正西望見白赤紫雲者是爲太素上眞人天皇白帝君三素雲也其時太素上眞白帝君乗翛條玉輦上詣玉天玄皇髙眞也子當祝拜之乞如上法也若五過見之則白日昇仙六道秘言曰以秋分日甲午上旬戊戍已亥之日清旦南望有素赤黄雲者是爲南極上眞人上皇赤帝君三素雲也其時南極上眞赤帝君乗絳琳碧輦上詣閬風臺詣九靈夫人若見當祝拜之如上法也若四過見之則白日昇仙七道祕言曰以立冬之日及甲辰上旬戊申已酉之日清旦西南望見緑紫青雲者是爲上清眞人帝君皇祖三素雲也其時上清眞人帝君皇祖乗玄景八光丹轝上詣髙上九天玉帝子心祝與拜如上法也若四見之者則紫晨太一君乗鳳文羽車來迎於子白日昇晨八道秘言曰以冬至之日及甲寅上旬戊午已未之日清旦正東望有朱碧黄雲者是爲太霄玉妃太虚上眞人三素雲也其時太霄玉妃太虚上眞人乗徘徊玉輦上詣太皇宫召太微天帝君子見是雲色者拜祝請乞如上法若三見之者玉皇命中黄司命乗絳龍玉車來迎於子白日昇晨右八道秘言畢矣見者當心存叩頭搏頰四再拜自陳如上法又當先沐浴燒香以待其時而心出望一食頃而還室中三素雲各自有色色上下相沓積如所次說也假令立春日見三元三素雲者則紫雲在上緑雲次之白雲在下共相沓也子謹視之上旬者謂甲子之日初入月十日之内有甲子日是也非其日非其時而見此雲者亦當拜祝則三倍於其日時見也他日効於甲子矣凡行九眞司八道之事者則天人衛護其形軀也眞皇守其命骨矣夫非有仙名玉籍者幽冥亦不以此經示之雖復希求終不見也有見之者皆玄書宿名應爲仙靈故也施行此道者勿令人犯其履屣并其巾褐衣服也履屣之𩔖常令新鮮巾褐衣服常令淨潔行此道也无犯禁忌太素上清致帝君五神氣法常以戊已日雞鳴時閉目存東方青氣大如弦從日中來使氣滿入頭泥丸中又有兩青煙復從目中出鬱鬱然須㬰變成二童子上下衣青如嬰兒始行狀也左目童子名曰帝君飛靈右目童子名曰太乙晨嬰並在我之左右侍兆之起居也極使髣髴念之良乆畢叩齒九通咽液九過微祝曰東方五靈日氣煥青帝君二童歘然已生旦入泥丸錬腦寳形左變右化得道之名使我上朝太素紫清畢極念二童子名則百害不干此二童子乃玄母之魂魄玄父之精神故假帝君太一而名變再以保兆魂以正兆魄魂魄保正則一形常生矣若能修之十八年白日昇天也存兩童子令目中出使青氣忽化而生成也存在左右令二童子各吐青氣以灌繞我一身洞入内外也上清太上帝君九眞中經卷上
