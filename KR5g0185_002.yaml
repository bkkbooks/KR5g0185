body:
  text: 張道陵譔并註太上眞人所以廣盼衆天豁落紫空宴觀七覺遊翔萬方寔由四液之飛津五珠之丹皇矣遂乗三華以八盻御飛剛以保眞分神易景逍遥上清者也兆覩琅玕之華則絳生之丹立焉旣獲九眞之髙章而九隂之戸啓矣長年在於玄覽得道在乎精微精微所宜澹質妙綏注神眞氣栖心冥機澄五神於紫房鏡混合於太微月華合於結璘日暉洞於鬱儀靈變朗於九晨挹凝液以虚飛玉經唱於明景煥龍華於扶希眇眇奔乎冥漢天地歘以推移立變分於圎塗電散疾於震雷居洪淵而不溺踐兵刃而不危將塞也則萬路楗閉欲通也則積滯蕩開沉扇无方隨意所宜大哉靈化之丹與帝一九隂齊其光暉服盡一劑後三光而不衰太上八景四蘂紫漿五珠絳生神丹方經第一絳陵朱兒七斤口訣是丹砂已越之精明上者第二丹山日魂四斤口訣是雄黄取精鮮色好洞明上者第三玄臺月華三斤口訣是雌黄不用青色第四青腰玉女五斤口訣是空青第五靈華沉腴三斤口訣是薰陸香第六北帝玄珠一斤口訣是消石第七紫陵文候五兩口訣是石英精好者第八東桑童子七兩口訣是青木香第九白素飛龍八兩口訣是白石英第十明玉神珠七兩口訣是琥珀拾芥者第十一五精金羊五兩口訣是陽起石第十二兩華飛英五兩口訣是雲母取光明白好者此物有種五各異名第十三流丹白膏九兩口訣是胡粉第十四亭炅獨生六兩口訣是雞舌香取味辛者第十五碧陵文候五兩口訣是石黛第十六倒行神骨五兩口訣是戎鹽第十七白虎脫齒四兩口訣是金牙石第十八九靈黄童三兩口訣是石硫黄第十九陸虚遺生五兩口訣是龍骨䑛之附舌者佳第二十威文中王六兩口訣是虎杖花隂乾而擣用隂乾當以細絹囊威勿以塵附一本云虎頭腦第二十一沉明合景四兩口訣是蚌中珠已穿凹者亦可用但令新者可用第二十二章陽羽玄四兩口訣是白附子第二十三緑伏石母五兩口訣是磁石取懸針者可用第二十四中山盈脂七兩口訣是太乙餘粮取中央黄好細理者右二十四種合二十四神之炁和九晨九隂之凝液結日月之明景也以次別擣先從丹砂始各四千杵藥皆令精上鮮明者搗藥人當得温慎无多口舌者當令先齋三十日日訖乃擣别䖏静室潔其衣服日數沐浴每從清香合藥可將三四人耳同心齊意隱静而䖏禁忌之法一如齋禁別擣藥都畢以藥安著釡中按苐一次先内丹砂次内雄黄次内雌黄次内空青次内薫陸後乃内太一餘粮在衆藥之上也二十四種内都畢皆當次叙令竟釡中小柳箆按令相薄也又次以水銀五斤灌諸藥之上都畢也又徐徐安上土釡以黄丹泥泥其平際以牡蠣泥泥其外際一寸隂乾十日取燥坼又上泥之畢又通以牡蠣泥泥其外面上下四邊令厚六分也又應先作六一泥以泥土釡内外作泥法用東海左顧牡蠣戎鹽黄丹滑石赤石脂蚓螻黄土凡六物皆令分等擣治下細絹簁和以百日苦酒極令酸釅和畢更擣三萬杵六一之泥成也以泥兩土釡内外漸漸薄泥向日曝令乾燥使經時稍稍上泥都畢令釡内外各厚二寸半如此泥釡了也作六一泥穩量取足用凡作泥之法皆以苦酒和泥无戎鹽者河東大鹽可用又以東海細鹽二斗内一斛苦酒中絞之去滓以和六一泥計此爲率作竈法當在无人䖏先作竈屋長四丈南向開屋東頭爲户屋南向爲紗窻屋中央作竈竈令四方四面開口以大䥫𨭊𨭊施四脚以著竈之中央使上下相逺髙下之法以意裁量好安隱之以所盛藥土釡好安著𨭊上以好𤎖火於下燒之令去釡底一尺許調適視火勿令暴猛足十八日訖更令火去釡下五寸復九日日足更令火去釡下三寸復更七日日足更令火去釡下一寸復五日日足更令火齊釡底之下足二十七日日足更令火至半下釡之腹三十日日足更令火末及下釡之上二寸二十四日日足都畢藥成也可復寒之七日而徐徐發視八景四蘂之華皆懸著上釡以三歳白雄雞羽掃之盛以金銀宻噐中其華當作景雲之色五十八種之氣流霞玄暎紫光鬱耀不可名字名曰八景四蘂五珠絳生神丹以二月八月朔平旦向太𡻕王再拜以東流水服一兩即頭生九晨之光面有玉華飛暎寳曜洞觀天下閉氣則立致三素之雲輿唾地則化爲日月之光左嘯則神仙稽首右嘯則八景合眞於是騰空上造以詣紫虚出入玉清寢宴晨房矣若藥華未盡起者可合泥固際如前法使宻更燒釡腹頓六十日萬无不成復寒之七日開發如初以錬麻腴一斛取四蘂紫華三兩合投之於銅器中下微火煎之三日藥成名曰四蘂紫漿日服一合夀同天地分形爲萬人乘虚而行所欲隨意以四蘂紫腴塗掌中及手爪甲以鏡細視之則見萬里之外物欲觀之事也隨心所視而視之亦照見方來之事仿像生死盛衰之玄運也此丹或名八景丹或名曰四蘂紫華或名曰太微紫玉腴或名曰五珠華丹或名曰絳生晨華或名曰三華上丹或名曰太上飛綱或名曰九晨上丹凡八名也錬麻腴之法清水五斛麻腴一斛空亭呉莎葱薤白各二斤合水腴空亭呉莎四物合煎之取一斛止作紫蘂腴當於静寂䖏發火以木蓋蓋銅噐上勿令腴煙散出錬腴亦可單服之以致延年糠火八景神丹日數旣足勿發復更火之如初日時進火之日法如先都畢寒之七日乃發藥煙變成明月珠五枚仰綴著上蓋皆褁以絳慔服其絳慔送以清水則絳雲見覆飛豋上清佩此五珠則以暎天下與日月同景名此丹曰五珠絳生以行上清用一倍火之五珠旣成勿發復更火之用日如先再火之日也火畢又寒之二十一日乃開之明月五珠又變成三華飛綱之龍發釡之後便恍惚長大文彩光華吐氣興雲所謂隱龍者也即乗之而行以造九晨之宫故髙上經曰子乗隱龍與天無窮夫火之倍日者計先火一日後火則應二日又後火則應四日又後火則應八日又後火則應十六日每事効此爲數也取作虎杖花之法用馬衘芎窮一斤細搗爲屑以虎杖花六兩和此屑爲餅而隂乾之旣乾而更搗而秤之取六兩餘者投之於東流水中隂乾虎杖花三年内者亦可用也不必新乾而必佳也乾時以絹囊盛之勿令塵附用薫陸香如漆者先多塵濁當以湯水洗澤去垢取令光明而无滓者可用也取錫十斤於鐡鑊熬之半日投四蘂紫華一銖合攪湏㬰立成萎蕤紫金屈伸在人而用之謂初成之時耳投二銖成紫蘂玉投三銖成玄梨緑景玉取八景丹滓搗三萬杵日服一丸如小豆身生玉光夀同九晨躰香聞三十里燒一丸如小豆辟百疫惡氣諸鬼不祥而芳十日不巳取一丸如𥞫米含之而唾則變化隨心任意隱形蔽影縦横天下欲止即吞此丸乃息已死人未三日服一丸如大豆立活當發口折齒送之以水又以一丸塗心則魂魄自還而四躰温軟也取鈆錫十斤於䥫噐中煎熬投此二丸如雞子黄合攪湏㬰立成黄金投三丸即成紫磨金帶一丸以行則山海之神来朝以一丸塗門戸則一家无病辟百鬼精魅日服一丸百日則色如女子三年而面反童嬰以一丸如小豆投水中則龍魚浮出而水沸以一丸如大豆投火中而火停光一日許上清高聖中央黄老君洞眞金玄九隂九眞玉經太上鬱儀結璘章八景神丹文皆刻於東華仙靈臺不宣於世上自非宿有仙名者不得聞見也傳授之時皆對齋思神審可付與立盟爲誓約无宣泄其受帝君九隂訣盟用青絲一結以爲盟誓其受太上鬱儀文盟用絳紋二十四尺此即日暉之誓也其受太上結璘章盟用碧紋二十四尺此即月華之誓也其受八景丹經盟用金環三雙此元常童子圎變之誓也合用四盟引九晨以爲約指日月以爲信必无宣泄心齊天地若不崇信誓身爲下鬼七世父母受考水火摙蒙山之石以投積夜之河按經師之受盟物也當施散於寒窮救貧病之急戹拯山川之餓夫營神靈之公用也若私割以自贍貪濫以爲利者則經師之七祖受長考於地獄身入風火甚痛也又弟子經師和心相愛所以親根本也道德旣厚則人鬼无間根本旣親則魂魄用寧若崇始慢終不恒其德者何年命之能長何神仙之可要乎得其領者始可與言尋道之本末矣太一餌瑰葩雲屑神仙上方夫茂實者翹春之明珠也巨勝者立秋之沉靈也丹棗者盛陽之雲芝也茯苓者絳晨之伏胎也五華合煙三氣陶精調安六氣養魂護神能用得其方位爲天仙老素反玄嬰胎童顔千害不傷延壽長年三春茂實者一斛名曰茂者茂於陽精也故爲藥首若三春不得合藥者藏茂實於密噐中封泥之須用乃開之到來春不復用先者勿取蛀䖝茂也此物難藏當索清浄燥噐盛之若茂實變成水者當絞去滓以茂水和藥也黒巨勝屑三斗先熬乃擣爲屑茯苓重秤十斤細搗下簁爲屑白蜜五升乾棗一斛大者剥去皮核蒸瓤搗令相和調清酒美者五斗凡六物合攪令合一内釡中微火煎令凝如糖狀似可圎者乃出着宻器中更分擣三千杵圎如雞子中黃日服三圓夫擣藥爲屑皆令極細細絹簁又内釡中煎之當數攪和之以蓋蓋釡上合藥欲得別處不欲得多人聞見得服此藥者一年目明耳聴彊志通神二年愈勝三年瘢黶皆滅四年躰烋氣充五年行歩如飛六年白髮還黒靣有童嬰之色身生玉光灾害不傷乗雲上升位爲眞人此藥𥙷胎益氣充精開明上圎方道士有單服此藥昇度者不可勝數不比於常方而宜用合餌之太一玄水雲華漿法取茂實三斛隂閉器中百日自化爲水以白蜜一斗合和微火煎之令三沸止一名曰雲茂朱漿口服五合使人躰香而面有童華神仙祕方也茂水少者以煉腴四斗清水一斛都合茂水共煎取四斗乃止微其火祕方上法也太一大四鎭圎方太一神仙生五臟鎭六腑養七竅和九關鍊三魂曜二童保一身長生千𡻕太一禹餘粮四兩定六腑鎭五臟眞當歸一兩以和餘粮止關節百痛薰陸香一兩以和當歸薰五臟内人參一兩補六腑津液助餘粮之勢雞舌香一兩除胃中客熱止痰悶凡五種以餘粮爲主四物從之先内主擣百杵乃次内皆令成散丹砂四兩攝魂魄鎭三神理和氣甘草一兩以和丹砂益肌層去白髪青木香一兩以助甘草去三蟲除伏尸乾地黄一兩和百髓滿腦血詹糖香一兩益目童薫下關凡五種以丹砂爲主四物從之先内主擣百杵乃次内皆令成散茯苓四兩以鎭七竅𥙷九虚和靈關术一兩以和茯苓益神氣明目童乾薑一兩以和术勢除炎熱開三關去寒冷防風一兩以𥙷濕痺除穢津止飢渴雲母粉一兩以澤形體面生光補骨血凡五種以茯苓爲主搗百杵乃次内皆令成散麥門冬四兩去心以鎭精神養靈液固百骨乾棗膏一兩以助麥門冬凝血脉去心中穢附子一兩熬之以益腦中氣鎭藏内除冷去痰胡麻一兩熬之以和喉中液鎭下關泄澤三神龍骨一兩以益六液養窮膓黑𩬊止白凡五種以麥門冬爲主四物從之先内主擣百杵乃次内之皆令成散凡四鎭神圎合二十種藥令精上者其五物爲一部皆令成散先内禹餘粮部擣三千杵次内丹砂部擣四千杵次内茯苓部擣五千杵次内麥門冬部擣六千杵又内白蜜四升又擣七千杵又内白蠟十二兩又擣八千杵又更下蜜令可圎若剛者當下蜜柔者不須又不可大下蜜但可多少下蜜爾更擣三萬杵藥成圓如雞子中黃亦可計黃以爲細圎而服之以正月九月十一月上建日合之滿日起服之百日中籌量服五圎當先一日不食後日平旦乃服服畢乃飲食如故千日之後二百日中服七圎二千日之後三百日中服二十丸三千日之後四百日中服三十圎計此爲率鎭神守中與天地相畢此藥萬年不敗若常服此藥一圎不可復服其餘雜餌之藥也合藥先齋戒七日永不得犯房室无令雞犬小兒婦人見之合藥時當先燒香設一淨席於東面西向爲大帝君太一太上太元君之坐也心存常呼祝之服藥時亦當心存之以向月王也此所謂四太方以鎭四神以治百病也令人不老逺視萬里之外白髮復黒齒落更生面目悅澤皮理生光服之一年宿疾皆除二年易息三年易肉四年易脉五年易髓六年易筋七年易骨八年易齒九年易形形髓皆易十年役使鬼神威御虎狼歩渉江川無事船梁山行不畏百害分身存亡長生不老服藥之後禁見死屍臭血食五辛及一切肉初服時當食麵棗栗乆乆自不復食若无麵者大麥亦佳無二麥當食米米令藥氣遲行耳大都無害今巳得仙道者猶服之服四鎭圎而食榖者後不復生百病此要道也太一胎精菖蒲圎散方太一貽精寳記内濟之方守中鍊神長生乆視塡凝骨髓補滿腦血徘徊精液益氣保眞合津定命五臟受靈精景上攝玄根不傾乆服此藥色如少女一名九轉胎精太上寳方不老長生太一之祕要也菖蒲一斤取石上生一寸有八九節者削去外皮秤取一斤以着白蜜一斗中漬之一日一宿出曝菖蒲令燥燥又内蜜中漬曝取盡一斗蜜乃止剉切菖蒲搗爲散以温和五臟補耳目不足塞諸腠理羙華色若躰中宿有客熱八風關痺者當用水中菖蒲水中菖蒲一名昌陽芝草踈節而根莖大者是也蜜漬出曝亦如上法昌陽兼治邪氣搔擾殺諸䖝而使身有光澤石上菖蒲使人不忘而使神明速開是曰心家之治甘草十兩取堅實好者削去上皮搗爲散以和六腑益胃開靈是曰胃家之治茯苓七兩取正白者削去上皮搗爲散以和血液益精神去痰積宿氣不定者也是曰肝家之治人參六兩取白色而有潤澤者可用搗爲散以調五臟治膓中宿疾和口齒津液明目遠視攝魂理魄是曰脾家之治當歸五兩取好者搗爲散主諸急痛治積氣不消益精神和不仁去臟中寒是曰肺家之治术五兩搗爲散去痰癖積飲停水治臟中百病鎭骨節内精神守年命益臟氣是曰腎家之治防風五兩搗爲散治濕痺八風所病止恍惚益精液是曰骨家之治逺志五兩搗爲散開五臟管竅塞滯之病是曰六腑津液心家之治菊華三兩擣爲散留魂神制七魄益眼光養腦氣是曰腸家之治右九種散以次内臼中都一治令合㑹更搗三千杵藥成盛以宻器中勿令氣泄也籌量一月之中令得九服耳服之或以平旦或以食後或以夜半隨宜任意若欲九者以白蜜又擣千杵服散日四方寸匕上服圎日四十圎如梧子若躰中先有邪氣之病志意恍惚及有虚損之勞者當令一月之中作十五服也又當加麝香七兩鹿茸四兩與九種散合治俱搗三千杵婦人女子皆可服所服用水飲無在多唯令藥進下喉者也亦可日日服藥藥無毒無禁忌合藥時齋三日不欲令人臨見唯執事者親營之耳當先搗鹿茸四兩爲散然後治合九種散中仍俱搗三千杵耳亦可入太一禹餘粮八兩代麝香鹿茸之用又佳又任意若代一種者用餘粮四兩耳上清太上帝君九眞中經卷下
