front:
  text: 上清太上帝君九真中經卷下既二太上玉晨鬱儀奔日赤景玉文太上玉晨結璘奔月黃景玉章右奔日月隱道太上上清太極九皇四真人之所寶祕玄虛元君之玉章也自非有金閣玉名及緑字東華者皆不聞見此二章之篇目矣行之者先清齋百日絶交人事乃為之也久久行之上奔日月得給玉童玉女各十五人太上鬱儀赤文結璘黃章乃太上玉帝君之靈祕篇也藏於九天之房丹瑶之臺非勤心好真宿有飛玄天仙之骨録者莫能得而見聞也聞其篇目皆不可妄言稱及犯者受考三官天地不赦𥘉令三百年得宣傳一人却後七百年乃復得傳一人若神真冥告有冝授者傳之也傳授之法皆師友相授以崇玄科也七魄餘氣變成龍虎守人地關伏於履屐之下三魂餘神化成五靈之雲映其巾中若有犯之者則心震意惕悵然自失所以神𧇊魂散精光翳滯也常當警僃之履屐之下不令有土者忌糞壤之氣也衣服內外不令有垢穢者忌汙慢之薰也侍經有髙上玉童玉女各十七人言此有經者之功過攝萬邪之不祥也若子視經深入别室燒香左右傳授之時對齋乃付按傳授之法各對齋靜以誠其心思神研真以一其志今寶書有九真之事及二十四神名字存念祝説皆靈言上音故以重齋受之始盟漏泄之考矣二人各共對齋二十四日又告齋前後各一日日訖出經以付弟子弟子寫畢剪髮束結詣師以為效信今代用白絹九丈準盟歃割之傷用白素者太素之氣也用九丈者九真數也受經以後不得宣盟泄經愆德毀正多言失行以穢道真遵修是經者則白日登晨違其約者七祖受地獄考也上清紫精君皇初紫靈道君常內鎮洞房觀盼九天偃息華辰之下寢晏九精之內拘魂魄於北上錬五神於真氣逍遙八素列名玄圖太上太道君吟曰上紫門望八晨列丹官具明神遊九氣舞天仙巾天青詠太曆帶豁落誦靈策招飈龍躡雙白引紫童徊二赤藏太素隱華壁此言是紫精三帝君常致五神之道經也太曆謂七聖玄紀靈策謂玉皇經科曰授非其人不遵法度為宣泄天文也漏違誓死為下鬼乃七祖考受風火之罪自非同氣寧當閉口西玄山洞臺中有此二經刻以玉簡書以金字及王屋清虛天皆有而不僃具唯太玄宫髙上臺及蓬萊府北室金柱玉壁刻文並僃具也中宫仙人太清諸官並不知此經是何事也峨眉山北洞中石室戶樞刻石書字曰鬱儀引日精結璘致月神得道處上宫位為帝君真凡二十字下仙見之臺自不解欲行得此不必愚賢但地上無此文耳真官玄法啓誓乃傳有道而行位為上真乃乘八景瓊輪遊行九晨詣太素宫見太一帝君俱朝元晨故祕言曰子得鬱儀結璘乃成上清之真不修上道不得見三元君太上鬱儀日中五帝諱字服色日中有青帝諱圎常無字照龍韜衣青玉錦帔蒼華飛羽裙首建翠蓉扶晨冠日中赤帝諱丹靈歭字緑虹映衣絳玉錦帔丹華飛羽裙建丹扶靈明冠日中白帝諱皓鬱將字回金霞衣素玉錦帔白羽飛華裙建皓靈扶蓋冠日中黑帝諱澄增停字玄録炎衣玄玉錦帔黑羽飛華裙建玄山芙蓉冠日中黃帝諱夀逸峊字飈暉像衣黃玉錦帔黃羽飛華裙建扶靈紫蓉冠右日中五帝君諱字服色欲行奔日道當祝識名字存帝服色在我之左右前後月中夫人之魂精內神名曖蕭臺摽右月中魂配五帝次之又祝之能知月魂名終身無災萬害不傷太上藏日月帝君夫人諱字於太素宫有知之者神仙太上結璘月中五帝夫人諱字服色月中青帝夫人諱娥隱珠字芬豔嬰衣青瓊錦帔翠龍鳯文飛羽裙月中赤帝夫人諱翳逸寥字宛延虛衣丹蘂玉錦帔朱華鳯絡飛羽裙月中白帝夫人諱靈素蘭字鬱連華衣白琳四出龍錦帔素羽鸞章飛華裙月中黑帝夫人諱結連翹字淳屬金衣玄琅九道雲錦帔黑羽龍文飛華裙月中黃帝夫人諱清榮襟字炅定容衣黃雲山文錦帔黃羽龍文飛華裙右五夫人頭並頽雲三角髻餘髮垂之至腰右月中五帝夫人諱字服色欲行奔月之道當祝識名字存夫人服色在已之左右前後日中五帝魂精內神名珠景赤童右日魂配月五夫人次又存祝之能知日魂名終身無疾萬禍不犯太上藏日月魂名於紫虛玉宫有知之者通神使靈存奔日月道者任意所便行耳不必盡為之也欲得靜室隱止唯令見日月之始暉處也若不絶人事與外物相干者不得行此道也夜半當燒香存五帝五帝夫人名字心祝曰願與帝君太一五神合景如一於是二十四年亦白日升天亦不必行奔存之道也常存在我之左右并心祝竊誦勿令耳聞行鬱儀奔日之道旦旦視日初出之時時無日當在靜室先臨目閉氣十息因又咽日光暉十過當存令日光霞使入口即而吞之畢微呼日中五帝君字并月魂名凡三過畢隂祝曰願得與五帝真君月魂精神共乘景雲上奔日宫又閉目乃存青帝君從日光中來下在我之左次又存赤帝君從日光中來在我之右次又存白帝君從日光中來在我之背次又存黑帝君從日光中來在我之左手上次又存黃帝君從日光中來在我之右手上次五帝都來存帝服色令髣佛於是又叩齒五通咽液九過微祝曰赤爐丹景圎華九明太暉啓晨煥曜朱精五帝肇霞映洞萬生觀落上真空洞條平運氣錬彩流蕩五形使我神化六府敷盈同與帝君太一無英驂乘絳雲陽遂九軿上奔日宫與帝合靈夀均天地二晨相傾畢又叩齒三通咽液三過微祝曰月魂精神曖蕭臺摽使我得到日窟之天東蒙長丘得受揮神之章帶九有之符食青精日𥹋飲雲碧之腴宴八極之城登明真之臺坐希林之殿詠玉晨之辭畢又存陽遂絳雲之車駕九赤龍從日光中來到我之前仍存與五帝共乘而奔日也自忘形良久又咽液十四過訖乃開目極念存思自有髣佛能久行此道者必得乘景奔日此鬱儀之道畢矣行結璘奔月之道夕夕視月初出之時無月者於靜室中先臨目閉氣九息因又咽月光九過當存月光使入我口中即而吞之畢微祝五帝夫人諱字并日魂名凡三過乃存月中青帝夫人從月光中來在我左右相次比如存日中五帝法都來存服色極令髣佛於是叩齒九通咽液九過微祝曰黃精啓暉元隂內彰映觀太玄開洞萬方散蔚寒飈七晨懸琅回隂三合天地吐光紫暉旋結浮華九空圎明賦彩六氣化通五帝夫人躡雲把風靈帔鬱羅佩瓊帶璫羽裙拂霄逸虛扇東騫樹敷晨蓋條秀蓬雲蟇錬摩扶養木王洞根萬里廕遏吾躬魂和神化六玄虛充還老歸嬰玉映反童帝君合化併景桃康時乘流鈴飛雲十龍上奔明月位為仙皇夀合二象天地無窮畢又叩齒九通咽液七過又微祝曰日魂精神珠景赤童使我西到六領之門入協晨玉宫八紘素丘八景上房得帶千明之符佩流星夜光之章坐太和之殿登七靈之臺飲月華雲膏食黃琬紫津之𥹋詠髙上之篇吟玉晨真辭畢又存流鈴飛雲之車駕十黃龍來從月光中到我之前仍存與五帝夫人共乘而奔月也自忘形良久又咽液三十過訖乃閉目極念存思自有髣佛能久行此道者必得乘景奔月此結璘之道畢矣若已得仙道又僃錬精思者二年存之便有髣佛三年形見五年行之得奔日月也自非已成仙人始欲精思者故為不速能久修之上屬二景得為上清真人太上八景四蘂紫漿五珠絳生神丹方經序一名三華飛綱丹經
